<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"> 
<link rel="stylesheet" type="text/css"
      href="/webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
    <meta charset="utf-8">
    <title>Modifier un Livre</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            Modifier un Livre
        </div>
        <div class="card-body">
            <form th:action="@{/saveProduit}" th:object="${book}" method="post">
                <div class="form-group">
                    <label class="control-label" hidden>ID Livre :</label>
                    <input type="hidden" th:field="*{idBook}" class="form-control" />
                </div>
                <div class="form-group">
                    <label class="control-label">Nom du Livre :</label>
                    <input type="text" th:field="*{BookName}" class="form-control" />
                    <span th:errors="*{BookName}" class="text-danger"></span>
                </div>
                <div class="form-group">
                    <label class="control-label">Prix du Livre :</label>
                    <input type="text" th:field="*{BookPrice}" class="form-control" />
                    <span th:errors="*{BookPrice}" class="text-danger"></span>
                </div>
                <div class="form-group">
                    <label class="control-label">Date de création :</label>
                    <input type="date" th:field="*{dateCreation}" class="form-control" />
                    <span th:errors="*{dateCreation}" class="text-danger"></span>
                </div>
                    <button type="submit" class="btn btn-primary">Valider</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
